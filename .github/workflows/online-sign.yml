name: TUF-on-CI online signing

permissions:
  id-token: 'write' # for OIDC identity access
  contents: 'write' # for committing snapshot/timestamp changes
  actions: 'write' # for dispatching publish workflow

on:
  schedule:
    - cron: '17 1,7,13,19 * * *'
  push:
    branches: [main]
    paths: ['metadata/**', '!metadata/timestamp.json', '!metadata/snapshot.json']
  workflow_dispatch:

jobs:
  online-sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC identity access
      contents: write # for committing snapshot/timestamp changes
      actions: write # for dispatching publish workflow
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - id: online-sign
        uses: theupdateframework/tuf-on-ci/actions/online-sign@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token: ${{ secrets.TUF_ON_CI_TOKEN || secrets.GITHUB_TOKEN }}

  update-issue:
    runs-on: ubuntu-latest
    needs: [online-sign]
    if: always() && !cancelled()
    permissions:
      issues: write # for modifying Issues
      contents: read # for checking out the repository
    steps:
      - name: Update the issue for the workflow
        uses: theupdateframework/tuf-on-ci/actions/update-issue@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token: ${{ secrets.TUF_ON_CI_TOKEN || secrets.GITHUB_TOKEN }}
          success: ${{ !contains(needs.*.result, 'failure') }}
